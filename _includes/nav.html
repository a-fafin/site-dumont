<nav>
  <a href="{{ '/' | relative_url }}" class="nav-logo">
    Dumont d'Urville · <span>CPGE</span>
  </a>

  <button class="nav-toggle" id="navToggle" aria-label="Ouvrir le menu">☰</button>

  <div class="nav-links" id="navLinks">
    {% for link in site.nav_links %}
      <a href="{{ link.url | relative_url }}"
         {% if page.url == link.url %}class="active"{% endif %}>
        {{ link.title }}
      </a>
    {% endfor %}
  </div>
</nav>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    var toggle = document.getElementById('navToggle');
    var links = document.getElementById('navLinks');
    toggle.addEventListener('click', function () {
      links.classList.toggle('open');
      toggle.textContent = links.classList.contains('open') ? '✕' : '☰';
    });
  });
</script>
